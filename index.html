<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Новожилов Каталог</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ЭКРАН ЗАГРУЗКИ -->
  <div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>
    <div>⏳ Загружаем объекты...</div>
  </div>

  <!-- СТАРТОВЫЙ ЭКРАН -->
<div id="welcomeScreen" class="screen welcome hidden">
  <div class="welcome-brand">
    <img src="logo.svg" alt="Logo" class="logo">
    <div class="brand-name">НОВОЖИЛОВ КАТАЛОГ</div>
  </div>
  <div class="welcome-media">
    <img id="welcomeImage" src="welcome-bg.jpg" alt="Welcome">
  </div>
  <div class="welcome-text">
    <h1>НАДЁЖНЫЙ ДОХОДНЫЙ</h1>
    <p>Готовый Арендный Бизнес</p>
  </div>
  <button class="btn-start" onclick="startApp()">ЗДЕСЬ</button>
</div>

  <!-- ОСНОВНОЙ ЭКРАН -->
  <div id="mainScreen" class="screen main hidden">
    <header class="main-header">
      <h2>🏢 Новожилов Каталог</h2>
    </header>
    <div id="objectsList" class="list"></div>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО -->
  <div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">×</button>
     
      <div id="objectDetails">
        <img id="modalImg" class="modal-img" src="" alt="">
        <h2 id="modalTitle"></h2>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-yield" id="modalYield"></div>
        <div class="modal-section">
          <h3>📖 Описание</h3>
          <p id="modalDesc"></p>
        </div>
      </div>

      <div id="leadForm" class="hidden" style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
        <h3 style="margin-bottom: 15px; text-align: center;">📝 Оставить заявку</h3>
        <div class="input-group">
          <label>Ваше имя *</label>
          <input type="text" id="leadName" placeholder="Иван">
        </div>
        <div class="input-group">
          <label>Телефон *</label>
          <input type="tel" id="leadPhone" placeholder="+7 (999) 000-00-00">
        </div>
        <div class="input-group">
          <label>Telegram (необязательно)</label>
          <input type="text" id="leadTelegram" placeholder="@username">
        </div>
        <button class="tg-btn" id="submitLeadBtn" onclick="submitLead()">Отправить заявку</button>
        <button class="tg-btn secondary" style="margin-top: 8px;" onclick="cancelLead()">Отмена</button>
      </div>

      <div id="modalActions" class="modal-actions">
        <button class="tg-btn" onclick="openLeadForm()">📞 Забронировать</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
