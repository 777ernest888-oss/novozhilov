<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Агентство недвижимости Новожилов. Каталог объектов.">
  <meta name="theme-color" content="#1a365d">
  <title>Новожилов</title>

  <script>
  // Пытаемся загрузить Telegram SDK, но если не выйдет — создаём заглушку
  window.Telegram = window.Telegram || {};
  window.Telegram.WebApp = window.Telegram.WebApp || {
    ready: function() {},
    expand: function() {},
    MainButton: { setText: function() {}, show: function() {}, onClick: function() {}, hide: function() {} },
    showAlert: function(msg) { alert(msg); },
    initDataUnsafe: { user: {} },
    close: function() { window.close(); }
  };
</script>
<script src="https://telegram.org/js/telegram-web-app.js" onerror="console.log('Telegram SDK not loaded, using fallback')"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous"/>
  <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>

  <!-- 🔄 ЭКРАН ЗАГРУЗКИ -->
  <div id="loadingScreen" class="loading-screen hidden">
    <div class="loading-spinner"></div>
    <div class="loading-text">Загружаем объекты...</div>
  </div>

  <!-- 🏠 ПРИВЕТСТВИЕ -->
  <div id="welcomeScreen" class="screen welcome hidden">
    <div class="welcome-media">
      <!-- ИСПРАВЛЕНО: правильные имена файлов -->
      <img id="welcomeImage" class="welcome-img hidden" src="welcome-bg.jpg?v=1" alt="Welcome">
    </div>
    <div class="welcome-bottom">
      <!-- ИСПРАВЛЕНО: правильный текст -->
      <h1 id="welcomeTitle">Агентство недвижимости Новожилов</h1>
      <p id="welcomeSubtitle">Каталог объектов</p>
      <button class="tg-btn" onclick="startApp()" type="button">Начать подбор</button>
    </div>
  </div>

  <!--  ОСНОВНОЙ КОНТЕНТ (без изменений, как в идеальном файле) -->
  <div id="mainContent" class="screen main hidden">
    <button id="customBackBtn" class="header-back-btn hidden" onclick="appBack()" type="button">
      <span class="back-arrow">←</span> Назад
    </button>

    <div class="view-toggle">
      <button id="listViewBtn" class="view-btn active" onclick="switchView('list')" type="button">📋 Список</button>
      <button id="mapViewBtn" class="view-btn" onclick="switchView('map')" type="button">🗺️ Карта</button>
    </div>

    <div id="listingsContainer" class="listings"></div>
    <div id="mapContainer" class="map-container hidden"></div>
  </div>
  <!--  МОДАЛЬНОЕ ОКНО ДЕТАЛЕЙ (со слайдерами) -->
  <div id="detailsModal" class="modal hidden">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal()" type="button">✕</button>
      <h2 id="modalTitle"></h2>
     
      <!-- 🖼 Слайдер фото -->
      <div id="modalGallery" class="modal-gallery"></div>
     
      <div id="modalPrice" class="modal-price"></div>
      <div id="modalMeta" class="modal-meta"></div>
    
      <div class="modal-section">
        <h3>📖 Описание</h3>
        <div id="modalDescription"></div>
      </div>

      <div class="modal-section">
        <h3>✨ Преимущества</h3>
        <div id="modalFeatures"></div>
      </div>

      <!-- 🏗 Слайдер планировок -->
      <div class="modal-section">
        <h3>📐 Планировки</h3>
        <div id="modalFloorPlans"></div>
      </div>

      <button id="modalConsultBtn" class="tg-btn modal-cta" type="button">📞 Получить консультацию</button>
    </div>
  </div>

  <!-- 📞 МОДАЛЬНОЕ ОКНО ЗАЯВКИ -->
  <div id="consultModal" class="modal hidden">
    <div class="modal-content">
      <button class="close-btn" onclick="closeConsultModal()" type="button">✕</button>
      <h2>Заказать консультацию</h2>
      <p class="form-hint">Оставьте контакты — мы перезвоним</p>
      <div id="consultObjectName" class="form-object">🏢 Объект</div>
    
      <form id="consultForm" onsubmit="submitConsultForm(event)" class="form-modal">
        <input type="text" id="consultName" placeholder="Ваше имя" required>
        <input type="tel" id="consultPhone" placeholder="+7 (___) ___-__-__" required>
        <button type="submit" class="tg-btn">Отправить заявку</button>
      </form>
    </div>
  </div>

  <!-- Leaflet + Наш скрипт -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>  <script src="app.js?v=1"></script>
</body>
</html>
